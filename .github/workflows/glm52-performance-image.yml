name: Build GLM-5.2 performance source image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: glm52-performance-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'HanHan009527/sglang'
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.identity.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out the exact source commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Freeze source identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          commit="$(git rev-parse HEAD)"
          tree="$(git rev-parse 'HEAD^{tree}')"
          mkdir -p .glm52-build
          git ls-files 'python/sglang/**/*.py' | LC_ALL=C sort | \
            while IFS= read -r source_file; do
              source_hash="$(sha256sum "$source_file" | awk '{print $1}')"
              printf '%s  %s\n' "$source_hash" "$source_file"
            done > .glm52-build/tracked-python.manifest
          python_hash="$(sha256sum .glm52-build/tracked-python.manifest | awk '{print $1}')"
          image="ghcr.io/hanhan009527/sglang:glm52-performance-${commit:0:12}"
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"
          printf 'tree=%s\n' "$tree" >> "$GITHUB_OUTPUT"
          printf 'python_hash=%s\n' "$python_hash" >> "$GITHUB_OUTPUT"
          printf 'image=%s\n' "$image" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the immutable amd64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.glm52-performance
          platforms: linux/amd64
          push: true
          tags: ${{ steps.identity.outputs.image }}
          build-args: |
            SGLANG_SOURCE_COMMIT=${{ steps.identity.outputs.commit }}
            SGLANG_SOURCE_TREE=${{ steps.identity.outputs.tree }}
            SGLANG_SOURCE_PYTHON_SHA256=${{ steps.identity.outputs.python_hash }}
            SGLANG_BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          provenance: mode=max

      - name: Record immutable image identity
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '### GLM-5.2 performance image'
            echo
            echo '- Source commit: `${{ steps.identity.outputs.commit }}`'
            echo '- Source tree: `${{ steps.identity.outputs.tree }}`'
            echo '- Python manifest: `${{ steps.identity.outputs.python_hash }}`'
            echo '- Image: `${{ steps.identity.outputs.image }}@${{ steps.build.outputs.digest }}`'
          } >> "$GITHUB_STEP_SUMMARY"

