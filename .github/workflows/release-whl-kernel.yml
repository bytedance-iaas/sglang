name: Build SGLang Kernel Wheel

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "Git ref to build from. Defaults to the workflow ref."
        required: false
        type: string
        default: ""
      python_version:
        description: "Python version passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "3.10"
      cuda_version:
        description: "CUDA version passed to sgl-kernel/build.sh"
        required: true
        type: string
        default: "12.9"
      arch:
        description: "Optional architecture override passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: ""
      artifact_name:
        description: "Uploaded artifact name"
        required: false
        type: string
        default: "sgl-kernel-wheel"
      runner:
        description: "Runner label for the wheel build"
        required: false
        type: string
        default: "x64-kernel-build-node"
      build_jobs:
        description: "BUILD_JOBS passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "64"
      nvcc_threads:
        description: "NVCC_THREADS passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "8"
      use_ccache:
        description: "USE_CCACHE passed to sgl-kernel/build.sh"
        required: false
        type: string
        default: "1"
  workflow_call:
    inputs:
      checkout_ref:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.10"
      cuda_version:
        required: true
        type: string
      arch:
        required: false
        type: string
        default: ""
      artifact_name:
        required: true
        type: string
      runner:
        required: false
        type: string
        default: "x64-kernel-build-node"
      build_jobs:
        required: false
        type: string
        default: "64"
      nvcc_threads:
        required: false
        type: string
        default: "8"
      use_ccache:
        required: false
        type: string
        default: "1"

jobs:
  build-wheel:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Build wheel
        run: |
          set -euo pipefail
          cd sgl-kernel
          chmod +x ./build.sh
          if [ -n "${{ inputs.arch }}" ]; then
            ./build.sh "${{ inputs.python_version }}" "${{ inputs.cuda_version }}" "${{ inputs.arch }}"
          else
            ./build.sh "${{ inputs.python_version }}" "${{ inputs.cuda_version }}"
          fi
        env:
          BUILD_JOBS: ${{ inputs.build_jobs }}
          NVCC_THREADS: ${{ inputs.nvcc_threads }}
          USE_CCACHE: ${{ inputs.use_ccache }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: sgl-kernel/dist/*
          if-no-files-found: error
