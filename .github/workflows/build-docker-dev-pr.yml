name: Build Development Docker Image (PR)

on:
  pull_request:
    branches:
      - ep_main
    paths:
      - ".github/workflows/build-docker-dev-pr.yml"
      - "docker/**"
      - "python/**"
      - "sgl-kernel/**"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to build from (leave empty to use current branch)"
        required: false
        default: ""

concurrency:
  group: build-docker-dev-pr-${{ github.event.pull_request.number || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUNNER_PROXY: http://100.68.160.245:3128
  RUNNER_NO_PROXY: localhost,127.0.0.1,::1,hub.byted.org,mirrors.byted.org,bytedpypi.byted.org,luban-source.byted.org,tosv.byted.org,tos-cn-north.byted.org

jobs:
  build-dev-x64:
    runs-on: x64-docker-build-node
    timeout-minutes: 240
    env:
      # The runner service itself also carries these proxy vars so action archive download
      # works during the Set up job phase before workflow steps begin.
      # The runner user also needs docker group membership because the very first smoke step
      # executes `docker version` before buildx setup.
      HTTP_PROXY: ${{ env.RUNNER_PROXY }}
      HTTPS_PROXY: ${{ env.RUNNER_PROXY }}
      ALL_PROXY: ${{ env.RUNNER_PROXY }}
      NO_PROXY: ${{ env.RUNNER_NO_PROXY }}
      BUILDKIT_NO_CLIENT_TOKEN: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

      - name: Show runner context
        run: |
          echo "RUNNER_NAME=${RUNNER_NAME}"
          echo "RUNNER_OS=${RUNNER_OS}"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"
          docker version

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            env.http_proxy=${{ env.RUNNER_PROXY }}
            env.https_proxy=${{ env.RUNNER_PROXY }}
            env.HTTP_PROXY=${{ env.RUNNER_PROXY }}
            env.HTTPS_PROXY=${{ env.RUNNER_PROXY }}
            env.no_proxy=${{ env.RUNNER_NO_PROXY }}
            env.NO_PROXY=${{ env.RUNNER_NO_PROXY }}

      - name: Bootstrap builder
        run: |
          docker buildx inspect --builder "${{ steps.buildx.outputs.name }}" --bootstrap

      - name: Build framework image
        run: |
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/amd64 \
            --target framework \
            --load \
            --progress=plain \
            -f docker/Dockerfile \
            --build-arg CUDA_VERSION=12.9.1 \
            --build-arg BUILD_TYPE=all \
            --build-arg GRACE_BLACKWELL=0 \
            --build-arg BRANCH_TYPE=local \
            --build-arg SGLANG_BRANCH=${{ github.head_ref || github.ref_name }} \
            --build-arg CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            --build-arg INSTALL_FLASHINFER_JIT_CACHE=1 \
            -t local/sglang-dev:${{ github.sha }} \
            .

      - name: Inspect built image
        run: |
          docker image inspect local/sglang-dev:${{ github.sha }} --format 'tag={{index .RepoTags 0}} size={{.Size}}'

      - name: Dump builder state
        if: always()
        run: |
          docker buildx ls
