name: Build Development Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to build from (leave empty to use current branch)"
        required: false
        default: ""
      tag:
        description: "Optional local image tag suffix"
        required: false
        default: ""
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: build-docker-dev-manual-${{ inputs.tag || inputs.pr_number || 'nightly' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUNNER_PROXY: http://100.68.160.245:3128
  RUNNER_NO_PROXY: localhost,127.0.0.1,::1

jobs:
  build-dev-x64:
    if: ${{ github.repository == 'bytedance-iaas/sglang' }}
    runs-on: x64-docker-build-node
    timeout-minutes: 240
    env:
      HTTP_PROXY: http://100.68.160.245:3128
      HTTPS_PROXY: http://100.68.160.245:3128
      ALL_PROXY: http://100.68.160.245:3128
      NO_PROXY: localhost,127.0.0.1,::1
      BUILDKIT_NO_CLIENT_TOKEN: "true"
      GITHUB_ARTIFACTORY: ${{ vars.GITHUB_ARTIFACTORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

      - name: Show runner context
        run: |
          echo "RUNNER_NAME=${RUNNER_NAME}"
          echo "RUNNER_OS=${RUNNER_OS}"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"
          docker version

      - name: Pre-pull public base image
        run: |
          docker pull nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04

      - name: Select daemon-backed Buildx builder
        run: |
          # This self-hosted runner already ships with a working daemon-backed
          # `default` builder. Reuse it instead of creating a new builder:
          # - additional docker-driver builders cannot be created here
          # - docker-container builders time out when resolving docker.io metadata
          # - RUN-stage proxy behavior is supplied by the build node's Docker config
          docker buildx version
          docker buildx use default
          docker buildx inspect --builder default --bootstrap

      - name: Build framework image
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SOURCE_ARG="--build-arg USE_LATEST_SGLANG=1"
          else
            SOURCE_ARG="--build-arg BRANCH_TYPE=local"
          fi

          IMAGE_TAG="${{ github.sha }}"
          if [ -n "${{ inputs.tag }}" ]; then
            IMAGE_TAG="${{ inputs.tag }}"
          elif [ -n "${{ inputs.pr_number }}" ]; then
            IMAGE_TAG="pr-${{ inputs.pr_number }}"
          fi

          ARTIFACTORY_ARG=()
          if [ -n "${GITHUB_ARTIFACTORY}" ]; then
            ARTIFACTORY_ARG+=(--build-arg "GITHUB_ARTIFACTORY=${GITHUB_ARTIFACTORY}")
          fi

          docker buildx build \
            --builder default \
            --platform linux/amd64 \
            --target framework \
            --load \
            --progress=plain \
            -f docker/Dockerfile \
            --build-arg CUDA_VERSION=12.9.1 \
            --build-arg BUILD_TYPE=all \
            --build-arg GRACE_BLACKWELL=0 \
            --build-arg CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            --build-arg INSTALL_FLASHINFER_JIT_CACHE=1 \
            ${SOURCE_ARG} \
            "${ARTIFACTORY_ARG[@]}" \
            -t local/sglang-dev:${IMAGE_TAG} \
            .

      - name: Inspect built image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          if [ -n "${{ inputs.tag }}" ]; then
            IMAGE_TAG="${{ inputs.tag }}"
          elif [ -n "${{ inputs.pr_number }}" ]; then
            IMAGE_TAG="pr-${{ inputs.pr_number }}"
          fi
          docker image inspect local/sglang-dev:${IMAGE_TAG} --format 'tag={{index .RepoTags 0}} size={{.Size}}'

      - name: Dump builder state
        if: always()
        run: |
          docker buildx ls
