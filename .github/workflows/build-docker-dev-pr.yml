name: Build Development Docker Image (Manual)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to build from (leave empty to use current branch)"
        required: false
        default: ""
      tag:
        description: "Optional tag value inserted into v<version>.byted.<tag>.<timestamp>"
        required: false
        default: ""

concurrency:
  group: build-docker-dev-manual-${{ inputs.tag || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUNNER_PROXY: http://100.68.160.245:3128
  RUNNER_NO_PROXY: localhost,127.0.0.1,::1
  VOLCENGINE_CR_REGISTRY: ${{ vars.VOLCENGINE_CR_REGISTRY }}
  VOLCENGINE_CR_NAMESPACE: ${{ vars.VOLCENGINE_CR_NAMESPACE }}
  VOLCENGINE_CR_REPOSITORY: ${{ vars.VOLCENGINE_CR_REPOSITORY || 'sglang' }}
  VOLCENGINE_CR_USERNAME: ${{ secrets.VOLCENGINE_CR_USERNAME }}
  VOLCENGINE_CR_PASSWORD: ${{ secrets.VOLCENGINE_CR_PASSWORD }}

jobs:
  build-dev-x64:
    if: ${{ github.repository == 'sgl-project/sglang' || github.repository == 'bytedance-iaas/sglang' }}
    runs-on: x64-docker-build-node
    timeout-minutes: 240
    env:
      HTTP_PROXY: http://100.68.160.245:3128
      HTTPS_PROXY: http://100.68.160.245:3128
      ALL_PROXY: http://100.68.160.245:3128
      NO_PROXY: localhost,127.0.0.1,::1
      BUILDKIT_NO_CLIENT_TOKEN: "true"
      GITHUB_ARTIFACTORY: ${{ vars.GITHUB_ARTIFACTORY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

      - name: Show runner context
        run: |
          echo "RUNNER_NAME=${RUNNER_NAME}"
          echo "RUNNER_OS=${RUNNER_OS}"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"
          docker version

      - name: Resolve image tag
        id: image-tag
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(grep -Po "(?<=__version__ = version = ')[^']+" python/sglang/_version.py)
          TIMESTAMP=$(TZ=Asia/Shanghai date +%Y%m%d%H%M)
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=v${VERSION}.byted.${{ inputs.tag }}.${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}.byted.${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pre-pull public base image
        run: |
          docker pull nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04

      - name: Select daemon-backed Buildx builder
        run: |
          # This self-hosted runner already ships with a working daemon-backed
          # `default` builder. Reuse it instead of creating a new builder:
          # - additional docker-driver builders cannot be created here
          # - docker-container builders time out when resolving docker.io metadata
          # - RUN-stage proxy behavior is supplied by the build node's Docker config
          docker buildx version
          docker buildx use default
          docker buildx inspect --builder default --bootstrap

      - name: Build framework image
        run: |
          IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"

          ARTIFACTORY_ARG=()
          if [ -n "${GITHUB_ARTIFACTORY}" ]; then
            ARTIFACTORY_ARG+=(--build-arg "GITHUB_ARTIFACTORY=${GITHUB_ARTIFACTORY}")
          fi

          docker buildx build \
            --builder default \
            --platform linux/amd64 \
            --target framework \
            --load \
            --progress=plain \
            -f docker/Dockerfile \
            --build-arg CUDA_VERSION=12.9.1 \
            --build-arg BUILD_TYPE=all \
            --build-arg GRACE_BLACKWELL=0 \
            --build-arg CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            --build-arg INSTALL_FLASHINFER_JIT_CACHE=1 \
            --build-arg BRANCH_TYPE=local \
            "${ARTIFACTORY_ARG[@]}" \
            -t local/sglang-dev:${IMAGE_TAG} \
            .

      - name: Inspect built image
        run: |
          IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
          docker image inspect local/sglang-dev:${IMAGE_TAG} --format 'tag={{index .RepoTags 0}} size={{.Size}}'

      - name: Push image to Volcengine CR
        run: |
          set -euo pipefail

          if [ -z "${VOLCENGINE_CR_REGISTRY}" ] || [ -z "${VOLCENGINE_CR_NAMESPACE}" ] || [ -z "${VOLCENGINE_CR_USERNAME}" ] || [ -z "${VOLCENGINE_CR_PASSWORD}" ]; then
            echo "::error::VOLCENGINE_CR_REGISTRY / VOLCENGINE_CR_NAMESPACE / VOLCENGINE_CR_USERNAME / VOLCENGINE_CR_PASSWORD are not fully configured"
            exit 1
          fi

          IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"

          TARGET_IMAGE="${VOLCENGINE_CR_REGISTRY}/${VOLCENGINE_CR_NAMESPACE}/${VOLCENGINE_CR_REPOSITORY}:${IMAGE_TAG}"

          echo "${VOLCENGINE_CR_PASSWORD}" | docker login "${VOLCENGINE_CR_REGISTRY}" --username "${VOLCENGINE_CR_USERNAME}" --password-stdin
          docker tag "local/sglang-dev:${IMAGE_TAG}" "${TARGET_IMAGE}"
          docker push "${TARGET_IMAGE}"
          echo "Published ${TARGET_IMAGE}"

      - name: Dump builder state
        if: always()
        run: |
          docker buildx ls
