name: CPU UT

on:
  pull_request:
    branches: [main, ep_main]
  workflow_dispatch:

jobs:
  cpu-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -e "python/[dev]"

      - name: Run registered CPU default suite
        working-directory: test
        run: |
          python3 run_suite.py --hw cpu --suite default

      - name: Run registered CPU stage-a suite
        working-directory: test
        run: |
          python3 run_suite.py --hw cpu --suite stage-a-cpu-only
